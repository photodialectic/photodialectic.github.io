<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      color: #ccc;
      background: #0d0d0d;
      line-height: 1.6;
      padding: 2rem 1.5rem;
    }
    main { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; color: #eee; }
    p { color: #888; margin-bottom: 1rem; }
    a { color: #6af; text-decoration: none; }
    a:hover { color: #8cf; }
    .sections { display: flex; gap: 1.5rem; margin-top: 1.5rem; }
    .sections a {
      flex: 1; display: block; padding: 1.5rem; text-align: center;
      background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
      text-decoration: none; color: #ddd; font-size: 1.1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .sections a:hover { border-color: #6af; box-shadow: 0 2px 12px rgba(102,170,255,0.12); }
    .sections small { display: block; color: #666; font-size: 0.8rem; margin-top: 0.3rem; }
    .card-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    .card-list a {
      display: block; padding: 1rem 1.25rem;
      background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
      text-decoration: none; color: #ddd; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card-list a:hover { border-color: #6af; box-shadow: 0 2px 12px rgba(102,170,255,0.12); }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
