<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      line-height: 1.6;
      padding: 2rem 1.5rem;
    }
    main { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    p { color: #555; margin-bottom: 1rem; }
    .sections { display: flex; gap: 1.5rem; margin-top: 1.5rem; }
    .sections a {
      flex: 1; display: block; padding: 1.5rem; text-align: center;
      background: #fff; border: 1px solid #e0e0e0; border-radius: 6px;
      text-decoration: none; color: #1a1a1a; font-size: 1.1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .sections a:hover { border-color: #999; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .sections small { display: block; color: #888; font-size: 0.8rem; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
