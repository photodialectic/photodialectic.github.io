---
layout: default
title: Cryptogram
---

<style>
  .puzzle-wrap { max-width: 580px; margin: 2rem auto; }
  .puzzle-wrap p.help { text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 1rem; }

  .ciphertext {
    display: flex; flex-wrap: wrap; gap: 1px 0; justify-content: center;
    font: 24px/1.8 'Courier New', monospace; letter-spacing: 1px;
    background: #111; padding: 1.25rem 1rem; border-radius: 6px; border: 1px solid #333;
  }
  .ciphertext .tile {
    display: inline-flex; flex-direction: column; align-items: center;
    width: 1.5em; cursor: pointer; border-radius: 3px; padding: 2px 0;
  }
  .ciphertext .tile .cipher { color: #6af; font-weight: 700; }
  .ciphertext .tile .plain {
    font-size: 15px; color: #4c4; min-height: 1.3em;
    border-bottom: 2px solid #444; width: 100%; text-align: center;
  }
  .ciphertext .tile:hover { background: rgba(102,170,255,0.1); }
  .ciphertext .tile.selected { background: rgba(102,170,255,0.2); }
  .ciphertext .tile.selected .plain { border-color: #6af; }
  .ciphertext .tile.solved .cipher { color: #4c4; }
  .ciphertext .tile.space .plain, .ciphertext .tile.punct .plain { border-color: transparent; }
  .ciphertext .tile.space .cipher, .ciphertext .tile.punct .cipher { color: #555; }

  .alpha-row {
    display: flex; flex-wrap: wrap; gap: 2px; justify-content: center;
    margin-top: 0.75rem;
  }
  .alpha-row .key {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    font: 13px 'Courier New', monospace; border-radius: 3px;
    background: #1a1a1a; border: 1px solid #333; cursor: pointer;
    transition: border-color 0.15s;
  }
  .alpha-row .key:hover { border-color: #6af; }
  .alpha-row .key.used { opacity: 0.25; pointer-events: none; }
  .alpha-row .key.highlight { border-color: #6af; background: rgba(102,170,255,0.15); }
  .alpha-row .key.solved { border-color: #4c4; color: #4c4; }

  .alpha-label { text-align: center; color: #555; font-size: 0.7rem; margin-top: 0.25rem; letter-spacing: 1px; }

  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.5rem; font: 14px monospace; color: #888;
  }
  .top-bar .left { display: flex; gap: 0.5rem; align-items: center; }
  .top-bar button {
    background: #1a1a1a; border: 1px solid #444; color: #ccc; border-radius: 4px;
    padding: 4px 10px; cursor: pointer; font: 12px sans-serif;
  }
  .top-bar button:hover { border-color: #6af; }
  .hint { color: #888; font-size: 0.85rem; text-align: center; min-height: 1.3em; margin-top: 0.5rem; }

  .make-area { margin-top: 1.5rem; text-align: center; }
  .make-link { color: #555; cursor: pointer; font: 13px sans-serif; }
  .make-link:hover { color: #6af; }
  .maker { display: none; margin-top: 0.75rem; text-align: center; }
  .maker.open { display: block; }
  .maker input, .maker textarea {
    width: 100%; max-width: 420px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
    color: #ccc; padding: 6px 10px; font: 13px sans-serif;
  }
  .maker textarea { resize: vertical; }
  .maker input:focus, .maker textarea:focus { outline: none; border-color: #6af; }
  .maker label { display: block; color: #888; font-size: 0.8rem; margin-top: 0.5rem; margin-bottom: 0.2rem; }
  .maker .share-row { display: flex; gap: 0.4rem; margin-top: 0.5rem; justify-content: center; }
  .maker .share-row input { flex: 1; }
</style>

<div class="puzzle-wrap">
  <div class="top-bar">
    <div class="left">
      <span id="solved-count">0 / 26</span>
      <button id="hint-btn">hint</button>
    </div>
    <button id="reset-btn">new puzzle</button>
  </div>

  <div id="ciphertext" class="ciphertext"></div>

  <p class="alpha-label">cipher &uarr; &rarr; plain &darr;</p>
  <div id="plain-row" class="alpha-row"></div>

  <div class="hint" id="hint-area"></div>

  <div class="make-area">
    <a class="make-link" id="make-link">+ make a puzzle to share</a>
    <div class="maker" id="maker">
      <label>sentence</label>
      <textarea id="maker-text" rows="2" placeholder="e.g. HELLO WORLD"></textarea>
      <label>hint (optional)</label>
      <input id="maker-hint" placeholder="e.g. A common programming phrase">
      <div class="share-row">
        <input id="maker-url" readonly placeholder="share URL">
        <button class="share-btn" id="maker-copy">copy</button>
      </div>
    </div>
  </div>
</div>

<script>
  let puzzle = { plain: '', tokens: [], types: [], cipherLetters: [], cipherSet: new Set() };
  let mapping = {}; // plain -> cipher
  let rev = {};    // cipher -> plain
  let user = {};   // cipher -> plain (user guesses)
  let selected = null;
  let hintText = '';

  function shuffle(s) {
    const a = s.split('');
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a.join('');
  }

  function genCipher(plain) {
    const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const letters = plain.toUpperCase().replace(/[^A-Z]/g, '');
    const unique = [...new Set(letters)];
    const unused = alpha.split('').filter(l => !unique.includes(l));
    const shuffled = shuffle(unused.join(''));
    const map = {};
    const pool = alpha.split('').filter(l => !unique.includes(l));
    const used = new Set();
    for (const l of unique) {
      let c;
      do { c = alpha[Math.floor(Math.random() * 26)]; } while (c === l || used.has(c));
      used.add(c);
      map[l] = c;
    }
    return map;
  }

  function loadPuzzle(data) {
    let plain = 'HELLO WORLD THIS IS A CRYPTOGRAM PUZZLE';
    hintText = '';
    if (data) {
      try {
        const obj = JSON.parse(atob(data));
        if (obj.text) plain = obj.text.toUpperCase();
        if (obj.hint) hintText = obj.hint;
      } catch {
        try { plain = atob(data).toUpperCase(); } catch {}
      }
    }

    mapping = genCipher(plain);
    rev = {};
    for (const [k, v] of Object.entries(mapping)) rev[v] = k;

    const tokens = [], types = [];
    for (const ch of plain) {
      if (ch >= 'A' && ch <= 'Z') { tokens.push(mapping[ch]); types.push('letter'); }
      else if (ch === ' ') { tokens.push(' '); types.push('space'); }
      else { tokens.push(ch); types.push('punct'); }
    }

    const cipherSet = new Set(Object.values(mapping));
    user = {};
    for (const c of cipherSet) user[c] = null;
    selected = null;

    puzzle = { plain, tokens, types, cipherLetters: [...cipherSet], cipherSet };
    render();
    renderAlphabet();
    updateSolved();
    document.getElementById('hint-area').textContent = hintText || '';
  }

  function getData() {
    const p = new URLSearchParams(window.location.search).get('p');
    return p || '';
  }

  function setData(d) {
    const url = new URL(window.location);
    if (d) url.searchParams.set('p', d);
    else url.searchParams.delete('p');
    window.history.replaceState({}, '', url);
  }

  function assignPlain(cipher, plain) {
    if (!cipher || !plain) return;
    for (const [c, p] of Object.entries(user)) {
      if (p === plain && c !== cipher) user[c] = null;
    }
    user[cipher] = plain;
    rev = {};
    for (const [c, p] of Object.entries(user)) {
      if (p) rev[c] = p;
    }
    selected = null;
    render();
    renderAlphabet();
    updateSolved();
  }

  function clearSelection() {
    selected = null;
    render();
    document.getElementById('hint-area').textContent = hintText || '';
  }

  function giveHint() {
    const unsolved = Object.entries(mapping).filter(([plain, cipher]) => !user[cipher]);
    if (unsolved.length === 0) return;
    const [plain, cipher] = unsolved[Math.floor(Math.random() * unsolved.length)];
    assignPlain(cipher, plain);
    selected = cipher;
    render();
    renderAlphabet();
    updateSolved();
  }

  function updateSolved() {
    const total = puzzle.cipherLetters.length;
    const solved = Object.values(user).filter(v => v !== null).length;
    document.getElementById('solved-count').textContent = solved + ' / ' + total;
    if (solved === total && total > 0) {
      document.getElementById('hint-area').textContent = 'solved!';
    }
  }

  function render() {
    const el = document.getElementById('ciphertext');
    el.innerHTML = '';
    puzzle.tokens.forEach((tok, i) => {
      const tile = document.createElement('span');
      tile.className = 'tile';
      const type = puzzle.types[i];
      if (type === 'space') tile.classList.add('space');
      else if (type === 'punct') tile.classList.add('punct');

      const cipherSpan = document.createElement('span');
      cipherSpan.className = 'cipher';
      cipherSpan.textContent = tok;
      tile.appendChild(cipherSpan);

      const plainSpan = document.createElement('span');
      plainSpan.className = 'plain';
      if (type === 'letter') {
        const guess = user[tok] || '';
        plainSpan.textContent = guess;
        if (guess) tile.classList.add('solved');
        if (selected === tok) tile.classList.add('selected');
        tile.addEventListener('click', () => {
          if (selected === tok) { clearSelection(); return; }
          selected = tok;
          render();
          renderAlphabet();
          document.getElementById('hint-area').textContent = 'pick a plain letter below (or press a key)';
        });
      }
      tile.appendChild(plainSpan);
      el.appendChild(tile);
    });
  }

  function renderAlphabet() {
    const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const row = document.getElementById('plain-row');
    row.innerHTML = '';
    const used = new Set(Object.values(user).filter(v => v));

    for (const l of alpha) {
      const key = document.createElement('span');
      key.className = 'key';
      key.textContent = l;

      // highlight if this is the guessed plain for selected cipher
      if (selected && user[selected] === l) key.classList.add('highlight');

      // mark used letters
      if (used.has(l)) key.classList.add('used');

      // mark if this letter is the actual answer for selected cipher
      if (selected && rev[selected] === l) key.classList.add('solved');

      key.addEventListener('click', () => {
        if (selected) assignPlain(selected, l);
      });
      row.appendChild(key);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key >= 'a' && e.key <= 'z' && selected) {
      assignPlain(selected, e.key.toUpperCase());
      e.preventDefault();
    }
    if (e.key === 'Backspace' && selected) {
      user[selected] = null;
      rev = {};
      for (const [c, p] of Object.entries(user)) if (p) rev[c] = p;
      render();
      renderAlphabet();
      updateSolved();
      document.getElementById('hint-area').textContent = hintText || '';
      e.preventDefault();
    }
    if (e.key === 'Escape') clearSelection();
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    const d = getData();
    loadPuzzle(d);
    setData(d);
  });
  document.getElementById('hint-btn').addEventListener('click', giveHint);

  // maker
  document.getElementById('make-link').addEventListener('click', () => {
    document.getElementById('maker').classList.toggle('open');
  });
  function updateMakerUrl() {
    const text = document.getElementById('maker-text').value.trim();
    const hint = document.getElementById('maker-hint').value.trim();
    if (text) {
      const obj = { text };
      if (hint) obj.hint = hint;
      const encoded = btoa(JSON.stringify(obj));
      const url = window.location.origin + window.location.pathname + '?p=' + encoded;
      document.getElementById('maker-url').value = url;
    } else {
      document.getElementById('maker-url').value = '';
    }
  }
  document.getElementById('maker-text').addEventListener('input', updateMakerUrl);
  document.getElementById('maker-hint').addEventListener('input', updateMakerUrl);
  document.getElementById('maker-copy').addEventListener('click', () => {
    const input = document.getElementById('maker-url');
    input.select();
    navigator.clipboard.writeText(input.value);
  });

  const d = getData();
  loadPuzzle(d);
  setData(d);
</script>
