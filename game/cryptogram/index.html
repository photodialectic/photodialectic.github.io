---
layout: default
title: Cryptogram
---

<style>
  .puzzle-wrap { max-width: 560px; margin: 2rem auto; text-align: center; }
  .ciphertext {
    display: flex; flex-wrap: wrap; gap: 0; justify-content: center;
    font: 22px/1.6 'Courier New', monospace; letter-spacing: 1px;
    background: #111; padding: 1.5rem; border-radius: 6px; border: 1px solid #333;
  }
  .ciphertext .char {
    display: inline-flex; flex-direction: column; align-items: center;
    width: 1.4em; cursor: pointer; border-radius: 2px; position: relative;
  }
  .ciphertext .char .cipher { color: #6af; font-weight: 700; }
  .ciphertext .char .plain {
    font-size: 16px; color: #4c4; min-height: 1.2em; border-bottom: 1px solid #555;
    width: 100%; text-align: center;
  }
  .ciphertext .char.active .plain { border-color: #6af; }
  .ciphertext .char.solved .cipher { color: #4c4; }
  .ciphertext .char.space .cipher,
  .ciphertext .char.punct .cipher { color: #666; }
  .ciphertext .char.space .plain,
  .ciphertext .char.punct .plain { border-color: transparent; }
  .ciphertext .char:hover { background: rgba(102,170,255,0.08); }
  .ciphertext .char.active { background: rgba(102,170,255,0.15); }

  .legend { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 1rem; }
  .legend span {
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    font: 12px monospace; border-radius: 3px; background: #1a1a1a; border: 1px solid #333;
  }
  .legend span.mapped { color: #4c4; border-color: #4c4; }
  .legend span.unmapped { color: #555; }
  .legend span.empty { border-color: transparent; background: none; }

  .top-bar { display: flex; justify-content: space-between; margin-bottom: 0.75rem; font: 14px monospace; color: #888; }
  .top-bar button, .share-btn {
    background: #1a1a1a; border: 1px solid #444; color: #ccc; border-radius: 4px;
    padding: 4px 12px; cursor: pointer; font: 13px sans-serif;
  }
  .top-bar button:hover, .share-btn:hover { border-color: #6af; }
  .share-row { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center; }
  .share-row input {
    background: #1a1a1a; border: 1px solid #333; border-radius: 4px; color: #ccc;
    padding: 4px 10px; font: 13px sans-serif; flex: 1; max-width: 300px;
  }
  .share-row input:focus { outline: none; border-color: #6af; }
  .msg { font: 14px monospace; color: #888; min-height: 1.5em; margin-top: 0.5rem; }
  .make-link { color: #6af; cursor: pointer; font: 13px sans-serif; margin-top: 0.5rem; display: inline-block; }
  .make-link:hover { color: #8cf; }
  .maker { display: none; margin-top: 0.75rem; }
  .maker.open { display: block; }
  .maker textarea {
    width: 100%; max-width: 400px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
    color: #ccc; padding: 8px; font: 14px sans-serif; resize: vertical;
  }
  .maker textarea:focus { outline: none; border-color: #6af; }
</style>

<div class="puzzle-wrap">
  <div class="top-bar">
    <span id="solved-count">0 / 26</span>
    <button id="reset-btn">new puzzle</button>
  </div>
  <div id="ciphertext" class="ciphertext"></div>
  <div class="legend" id="legend"></div>
  <div class="msg" id="msg"></div>

  <a class="make-link" id="make-link">+ make a puzzle</a>
  <div class="maker" id="maker">
    <textarea id="maker-input" rows="2" placeholder="Type a sentence to turn into a puzzle..."></textarea>
    <div class="share-row">
      <input id="maker-url" readonly placeholder="URL will appear here">
      <button class="share-btn" id="maker-copy">copy</button>
    </div>
  </div>
</div>

<script>
  let puzzle = { plain: '', cipher: '', mapping: {}, cipherLetters: [], tokenTypes: [] };
  let userMap = {}; // cipher letter -> plain letter (or null)
  let selectedCipher = null;
  let activeCipher = null;

  function shuffle(s) {
    const a = s.split('');
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a.join('');
  }

  function generateCipher(plain) {
    const letters = plain.toUpperCase().replace(/[^A-Z]/g, '');
    const unique = [...new Set(letters)];
    const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const unused = alpha.split('').filter(l => !unique.includes(l));
    let shuffled = shuffle(unused.join(''));
    const mapping = {};
    const used = new Set();
    for (const l of unique) {
      let c;
      do { c = alpha[Math.floor(Math.random() * 26)]; } while (c === l || used.has(c));
      used.add(c);
      mapping[l] = c;
    }
    return mapping;
  }

  function loadPuzzle(encoded) {
    let plain;
    try {
      plain = atob(encoded).toUpperCase();
    } catch { plain = 'HELLO WORLD THIS IS A CRYPTOGRAM PUZZLE';
    }
    const mapping = generateCipher(plain);
    const rev = {};
    for (const [k, v] of Object.entries(mapping)) rev[v] = k;

    const tokens = [];
    const types = [];
    for (const ch of plain) {
      if (ch >= 'A' && ch <= 'Z') {
        tokens.push(mapping[ch]);
        types.push('letter');
      } else if (ch === ' ') {
        tokens.push(' ');
        types.push('space');
      } else {
        tokens.push(ch);
        types.push('punct');
      }
    }

    puzzle = { plain, cipher: tokens.join(''), mapping, rev, tokens, types };
    userMap = {};
    for (const [k, v] of Object.entries(mapping)) {
      userMap[v] = null;
    }
    selectedCipher = null;
    activeCipher = null;
    render();
    updateLegend();
    updateSolved();
    document.getElementById('msg').textContent = '';
  }

  function getUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('p') || '';
  }

  function setUrl(p) {
    const url = new URL(window.location);
    if (p) url.searchParams.set('p', p);
    else url.searchParams.delete('p');
    window.history.replaceState({}, '', url);
  }

  function render() {
    const el = document.getElementById('ciphertext');
    el.innerHTML = '';
    puzzle.tokens.forEach((tok, i) => {
      const span = document.createElement('span');
      span.className = 'char';
      const type = puzzle.types[i];
      if (type === 'space') span.classList.add('space');
      if (type === 'punct') span.classList.add('punct');

      const cipherSpan = document.createElement('span');
      cipherSpan.className = 'cipher';
      cipherSpan.textContent = tok;
      span.appendChild(cipherSpan);

      const plainSpan = document.createElement('span');
      plainSpan.className = 'plain';
      if (type === 'letter') {
        const guess = userMap[tok];
        plainSpan.textContent = guess || '';
        if (guess) span.classList.add('solved');
        if (selectedCipher === tok) span.classList.add('active');
      }
      span.appendChild(plainSpan);

      if (type === 'letter') {
        span.addEventListener('click', () => selectCipher(tok));
      }
      el.appendChild(span);
    });
  }

  function selectCipher(c) {
    if (activeCipher === c) { activeCipher = null; selectedCipher = null; render(); return; }
    selectedCipher = c;
    activeCipher = c;
    render();
    document.getElementById('msg').textContent = 'press a letter key to map ' + c + ' \u2192 ?';
  }

  function updateLegend() {
    const el = document.getElementById('legend');
    el.innerHTML = '';
    const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const rev = puzzle.rev || {};
    for (const l of alpha) {
      const span = document.createElement('span');
      const plain = rev[l];
      if (plain) {
        span.textContent = l + '\u2192' + plain;
        span.classList.add('mapped');
      } else if (userMap[l] !== undefined) {
        span.textContent = l;
        span.classList.add('unmapped');
      } else {
        span.textContent = '';
        span.classList.add('empty');
      }
      el.appendChild(span);
    }
  }

  function updateSolved() {
    const rev = puzzle.rev || {};
    const total = Object.keys(rev).length;
    const solved = Object.values(userMap).filter(v => v !== null).length;
    document.getElementById('solved-count').textContent = solved + ' / 26';
    if (solved === total && total > 0) {
      document.getElementById('msg').textContent = 'solved!';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key >= 'a' && e.key <= 'z' && activeCipher) {
      const plain = e.key.toUpperCase();
      // Check not already mapped to by another cipher letter
      for (const [c, p] of Object.entries(userMap)) {
        if (p === plain && c !== activeCipher) {
          userMap[c] = null;
        }
      }
      userMap[activeCipher] = plain;
      // rebuild rev
      puzzle.rev = {};
      for (const [k, v] of Object.entries(userMap)) {
        if (v) puzzle.rev[k] = v;
      }
      activeCipher = null;
      selectedCipher = null;
      render();
      updateLegend();
      updateSolved();
    }
    if (e.key === 'Backspace' && activeCipher) {
      userMap[activeCipher] = null;
      puzzle.rev = {};
      for (const [k, v] of Object.entries(userMap)) {
        if (v) puzzle.rev[k] = v;
      }
      render();
      updateLegend();
      updateSolved();
    }
    if (e.key === 'Escape') {
      activeCipher = null;
      selectedCipher = null;
      render();
      document.getElementById('msg').textContent = '';
    }
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    const p = getUrl();
    if (p) loadPuzzle(p);
    else loadPuzzle('');
    setUrl(p);
  });

  // maker
  document.getElementById('make-link').addEventListener('click', () => {
    document.getElementById('maker').classList.toggle('open');
  });
  document.getElementById('maker-input').addEventListener('input', () => {
    const text = document.getElementById('maker-input').value.trim();
    if (text) {
      const encoded = btoa(text);
      const url = window.location.origin + window.location.pathname + '?p=' + encoded;
      document.getElementById('maker-url').value = url;
    } else {
      document.getElementById('maker-url').value = '';
    }
  });
  document.getElementById('maker-copy').addEventListener('click', () => {
    const input = document.getElementById('maker-url');
    input.select();
    navigator.clipboard.writeText(input.value);
  });

  // init
  const p = getUrl();
  if (p) loadPuzzle(p);
  else loadPuzzle('');
</script>
